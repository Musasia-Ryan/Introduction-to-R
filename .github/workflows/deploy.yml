name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a deploy manually from GitHub

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true   # binary packages — much faster installs

      - name: Install R packages
        run: install.packages(c("tidyverse", "readxl"))
        shell: Rscript {0}

      - name: Render and publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages       # pushes rendered HTML to the gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
